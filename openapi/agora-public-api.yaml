openapi: 3.1.0
info:
  title: Agora Public API
  version: 1.1.0
  description: Agora Public API. Authenticate with an API key and upload leads to authorized campaigns. Manage webhook endpoints to receive real-time event notifications.
servers:
  - url: https://core.agoraai.tech/api/v1
    description: Production API
  - url: https://core-dev.agoraai.tech/api/v1
    description: Development API
  - url: http://localhost:8000/api/v1
    description: Local Tilt backend
tags:
  - name: Authentication
    description: API key exchange for short-lived bearer tokens.
  - name: Leads
    description: API-key-authenticated lead ingestion.
  - name: Webhooks
    description: Manage outbound webhook endpoints and view delivery history for a campaign.
paths:
  /auth/api-key/token:
    post:
      tags: [Authentication]
      operationId: loginWithApiKey
      summary: Log in with an API key
      description: Logs in with a long-lived Agora API key and returns a short-lived bearer JWT. The API key is only sent to this endpoint and should not be used for normal API calls.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiKeyTokenRequest"
            examples:
              apiKey:
                summary: API key exchange
                value:
                  api_key: "agora_live_REDACTED"
      responses:
        "200":
          description: Short-lived bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyTokenResponse"
              examples:
                token:
                  value:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.REDACTED"
                    token_type: "Bearer"
                    expires_in: 300
        "401":
          description: The API key is invalid, expired, or revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidApiKey:
                  value:
                    error: "invalid_api_key"
                    message: "The provided API key is invalid, expired, or revoked."
  /leads/upload:
    post:
      tags: [Leads]
      operationId: uploadLeads
      summary: Upload leads
      description: Uploads lead JSON into an authorized campaign using a short-lived bearer token obtained from API key exchange. Processing reuses Agora's contact upload pipeline.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUploadRequest"
            examples:
              oneLead:
                summary: Single lead upload
                value:
                  campaign_id: 1
                  source: "api"
                  leads:
                    - first_name: "Jane"
                      last_name: "Doe"
                      email: "jane.doe@example.test"
                      phone: "+15551234567"
                      company: "Example Co"
                      title: "VP of Operations"
                  compliance_acknowledged: true
      responses:
        "202":
          description: Upload accepted and queued or processed through the upload job pipeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadUploadResponse"
              examples:
                accepted:
                  value:
                    status: "accepted"
                    import_id: "5"
                    received_count: 1
                    valid_count: 1
                    invalid_count: 0
                    errors: []
        "400":
          description: Request validation failed, such as missing campaign for API-token upload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing, invalid, or expired bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Bearer token is not authorized for the target campaign or company.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Lead payload failed structured validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadUploadResponse"

  /campaigns/{campaign_id}/webhooks/events:
    get:
      tags: [Webhooks]
      operationId: listWebhookEventTypes
      summary: List webhook event types
      description: Returns all event type strings that can be subscribed to on a webhook endpoint.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: Array of event type strings.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                eventTypes:
                  value:
                    - "lead.created"
                    - "leads.bulk_created"
                    - "lead.status_changed"
                    - "lead.converted"
                    - "call.started"
                    - "call.completed"
                    - "form.submitted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaign_id}/webhooks/endpoints:
    get:
      tags: [Webhooks]
      operationId: listWebhookEndpoints
      summary: List webhook endpoints
      description: Returns all webhook endpoints registered on a campaign.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      responses:
        "200":
          description: List of webhook endpoints.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookEndpointResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Webhooks]
      operationId: createWebhookEndpoint
      summary: Create a webhook endpoint
      description: Registers a new webhook endpoint on a campaign. Returns the endpoint with its signing secret — store it securely, it will not be shown again.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointCreate"
            examples:
              create:
                summary: Subscribe to lead events
                value:
                  url: "https://hooks.example.com/agora"
                  description: "Production lead handler"
                  subscribed_events:
                    - "lead.created"
                    - "lead.status_changed"
                  is_enabled: true
      responses:
        "201":
          description: Endpoint created. The `secret` field is only returned here — store it securely.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointResponse"
        "400":
          description: Invalid event type or request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /campaigns/{campaign_id}/webhooks/endpoints/{endpoint_id}:
    patch:
      tags: [Webhooks]
      operationId: updateWebhookEndpoint
      summary: Update a webhook endpoint
      description: Updates one or more fields on an existing webhook endpoint. Omitted fields are unchanged.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/EndpointId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookEndpointUpdate"
            examples:
              disable:
                summary: Disable an endpoint
                value:
                  is_enabled: false
              changeUrl:
                summary: Update the destination URL
                value:
                  url: "https://hooks.example.com/agora-v2"
      responses:
        "200":
          description: Updated endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointResponse"
        "400":
          description: Invalid event type or request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Webhooks]
      operationId: deleteWebhookEndpoint
      summary: Delete a webhook endpoint
      description: Permanently deletes a webhook endpoint and all its delivery history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "204":
          description: Endpoint deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaign_id}/webhooks/endpoints/{endpoint_id}/deliveries:
    get:
      tags: [Webhooks]
      operationId: listWebhookDeliveries
      summary: List deliveries for a webhook endpoint
      description: Returns the delivery history for a webhook endpoint, ordered by most recent first.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/EndpointId"
        - name: success
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by delivery outcome. Omit to return all deliveries.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of deliveries to return.
      responses:
        "200":
          description: List of deliveries, most recent first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookDeliveryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaign_id}/webhooks/endpoints/{endpoint_id}/test:
    post:
      tags: [Webhooks]
      operationId: testWebhookEndpoint
      summary: Send a test ping to a webhook endpoint
      description: Sends a synthetic `ping` event to the endpoint URL and records the delivery result. Useful for verifying connectivity and signature verification before going live.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "200":
          description: Delivery record for the test ping.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaign_id}/webhooks/endpoints/{endpoint_id}/regenerate-secret:
    post:
      tags: [Webhooks]
      operationId: regenerateWebhookSecret
      summary: Regenerate the signing secret
      description: Rotates the HMAC-SHA256 signing secret for a webhook endpoint. The old secret stops working immediately. Store the new secret securely — it will not be shown again.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - $ref: "#/components/parameters/EndpointId"
      responses:
        "200":
          description: New signing secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateSecretResponse"
              examples:
                newSecret:
                  value:
                    secret: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /campaigns/{campaign_id}/webhooks/deliveries/{delivery_id}/redeliver:
    post:
      tags: [Webhooks]
      operationId: redeliverWebhookDelivery
      summary: Redeliver a webhook delivery
      description: Re-sends a previously delivered (or failed) event to the original endpoint. Creates a new delivery record linked to the original via `redelivery_of_id`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CampaignId"
        - name: delivery_id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the delivery to redeliver.
      responses:
        "200":
          description: New delivery record for the redelivery attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    CampaignId:
      name: campaign_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: ID of the campaign.
    EndpointId:
      name: endpoint_id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: ID of the webhook endpoint.

  responses:
    Unauthorized:
      description: Missing, invalid, or expired bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Bearer token is not authorized for this campaign.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found or does not belong to this campaign.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived bearer token returned by `loginWithApiKey`.

  schemas:
    ApiKeyTokenRequest:
      type: object
      required: [api_key]
      additionalProperties: false
      properties:
        api_key:
          type: string
          minLength: 16
          example: "agora_live_YOUR_KEY"
          description: Agora API key. Never log or persist this value outside secure credential storage.
    ApiKeyTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      additionalProperties: false
      properties:
        access_token:
          type: string
          description: Short-lived bearer JWT. Do not log this value.
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          example: 300
    LeadUploadRequest:
      type: object
      required: [campaign_id, leads, compliance_acknowledged]
      additionalProperties: false
      properties:
        campaign_id:
          type: integer
          minimum: 1
          description: Target campaign. Required for API-key-derived bearer tokens.
        source:
          type: string
          default: api
        leads:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LeadInput"
        tags:
          type: array
          items:
            type: string
        skip_duplicates:
          type: boolean
          default: true
        compliance_acknowledged:
          type: boolean
          description: Must be true to confirm the caller has permission to upload these contacts.
        disclaimer_version:
          type: string
          default: v1.0
    LeadInput:
      type: object
      additionalProperties: true
      required: [phone]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          description: E.164 formatted phone number is preferred.
        company:
          type: string
        title:
          type: string
    LeadUploadResponse:
      type: object
      required: [status, import_id, received_count, valid_count, invalid_count, errors]
      additionalProperties: false
      properties:
        status:
          type: string
          example: accepted
        import_id:
          type: string
        received_count:
          type: integer
        valid_count:
          type: integer
        invalid_count:
          type: integer
        errors:
          type: array
          items:
            $ref: "#/components/schemas/LeadUploadError"
    LeadUploadError:
      type: object
      required: [row, message]
      additionalProperties: false
      properties:
        row:
          type: integer
        field:
          type: ["string", "null"]
        message:
          type: string
    WebhookEndpointCreate:
      type: object
      required: [url]
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          description: HTTPS URL Agora will POST events to.
          example: "https://hooks.example.com/agora"
        description:
          type: string
          nullable: true
          description: Optional human-readable label for this endpoint.
        subscribed_events:
          type: array
          items:
            type: string
          default: []
          description: Event types to subscribe to. Use `listWebhookEventTypes` for valid values.
        is_enabled:
          type: boolean
          default: true
          description: Whether the endpoint should receive deliveries.
    WebhookEndpointUpdate:
      type: object
      additionalProperties: false
      properties:
        url:
          type: string
          format: uri
          nullable: true
          description: New destination URL.
        description:
          type: string
          nullable: true
        subscribed_events:
          type: array
          items:
            type: string
          nullable: true
          description: Replaces the full subscribed event list.
        is_enabled:
          type: boolean
          nullable: true
    WebhookEndpointResponse:
      type: object
      required: [id, campaign_id, url, subscribed_events, is_enabled, created_at]
      additionalProperties: false
      properties:
        id:
          type: integer
        campaign_id:
          type: integer
        url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        subscribed_events:
          type: array
          items:
            type: string
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        secret:
          type: string
          nullable: true
          description: Signing secret. Only returned on creation — store it securely.
        last_delivery_is_successful:
          type: boolean
          nullable: true
          description: Outcome of the most recent delivery attempt, or null if no deliveries yet.
    WebhookDeliveryResponse:
      type: object
      required: [id, endpoint_id, event_type, payload, is_successful, attempt_number, delivered_at]
      additionalProperties: false
      properties:
        id:
          type: integer
        endpoint_id:
          type: integer
        event_type:
          type: string
          example: "lead.created"
        payload:
          type: object
          description: Full JSON payload that was sent to the endpoint.
        response_status:
          type: integer
          nullable: true
          description: HTTP status code returned by the endpoint, or null if the request failed to connect.
        response_body:
          type: string
          nullable: true
          description: First 1 KB of the response body.
        duration_ms:
          type: integer
          nullable: true
          description: Round-trip time in milliseconds.
        is_successful:
          type: boolean
          description: True if the endpoint returned a 2xx status within 10 seconds.
        attempt_number:
          type: integer
          description: 1 for the original delivery, 2 for the automatic retry.
        delivered_at:
          type: string
          format: date-time
        redelivery_of_id:
          type: integer
          nullable: true
          description: ID of the original delivery if this is a manual redeliver, otherwise null.
    RegenerateSecretResponse:
      type: object
      required: [secret]
      additionalProperties: false
      properties:
        secret:
          type: string
          description: New HMAC-SHA256 signing secret. Store securely — not shown again.
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        error:
          type: string
        message:
          type: string
