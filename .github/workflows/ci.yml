name: SDK CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache-dependency-path: sdks/go/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node and Yarn PnP
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn dependencies
        run: |
          if [ -f yarn.lock ]; then
            yarn install --immutable
          else
            yarn install
          fi

      - name: Validate SDK repo
        run: yarn release:verify

      - name: Verify generated SDK metadata
        run: |
          set -euo pipefail
          ! rg -n "GIT_USER_ID|GIT_REPO_ID|NoLicense|auth/settings/api-keys|/admin|/dashboard|/rum|/firebase|X-Internal-API-Key" \
            openapi restish plugins sdks README.md
