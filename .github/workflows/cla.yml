name: CLA Assistant Lite

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, 'I have read the CLA'))
    steps:
      - name: CLA Assistant Lite
        uses: contributor-assistant/github-action@v2.6.1
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/AGORA-AI-Software/.github/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "bot*,dependabot*,renovate*,github-actions*,leema,Leema-bot"
          custom-notsigned-prcomment: |
            ## CLA Signature Required

            Thank you for your pull request! Before we can merge it, you need to sign our
            [Contributor License Agreement](https://github.com/AGORA-AI-Software/.github/blob/main/CLA.md).

            ### How to sign
            Please read the CLA document and then comment on this PR with **exactly** this text:

            > I have read the CLA Document and I hereby sign the CLA

            After signing, the CLA check will pass automatically. You only need to sign once —
            future PRs will be approved instantly.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
